apiVersion: batch/v1
kind: CronJob
metadata:
  name: rcac-docs-prod-restart
  namespace: rcac-docs
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          volumes:
            - name: kubeconfig
              secret:
                secretName: kubeconfig-secret
          containers:
            - name: kubectl
              image: geddes-registry.rcac.purdue.edu/docker-hub-cache/bitnami/kubectl:latest
              env:
                - name: KUBECONFIG
                  value: /etc/kubeconfig/config
              volumeMounts:
                - name: kubeconfig
                  mountPath: /etc/kubeconfig
                  readOnly: true
              command:
                - kubectl
                - rollout
                - restart
                - deployment/rcac-docs-prod
                - -n
                - rcac-docs

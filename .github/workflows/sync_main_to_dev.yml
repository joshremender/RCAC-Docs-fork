name: Sync main to dev

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.PURDUERCAC_DOCS_BOT_APP_ID }}
          private_key: ${{ secrets.PURDUERCAC_DOCS_BOT_PRIVATE_KEY }}

      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        run: |
          git config user.name "purduercac-docs-bot"
          git config user.email "purduercac-docs-bot@users.noreply.github.com"

      - name: Merge main into dev
        run: |
          git fetch origin main
          git merge origin/main --no-edit -X ours
          # Accept main's mkdocs.yml (content/nav updates), then re-add dev-only a11y.js
          git checkout origin/main -- mkdocs.yml
          grep -q 'a11y.js' mkdocs.yml || sed -i '/external-links.js/a\  - assets\/js\/a11y.js' mkdocs.yml
          git add mkdocs.yml
          # Restore dev's framework files — never overwrite with main's
          git checkout ORIG_HEAD -- docs/stylesheets/ overrides/partials/toc.html
          git diff --cached --quiet || git commit -m "Restore dev framework files after main sync"

      - name: Push dev
        run: |
          git push https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }} HEAD:dev

name: Deploy prod to Geddes

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'modulefiles/**'
      - 'tools/**'
      - 'wcag_audit/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required by git-revision-date-localized plugin

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.geddes-prod
          push: true
          tags: ghcr.io/purduercac/rcac-docs-prod:latest

      - name: Notify success
        run: echo "Image pushed to ghcr.io. Geddes CronJob will redeploy rcac-docs-prod within 5 minutes."

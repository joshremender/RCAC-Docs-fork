site_name: RCAC Documentation
site_description: Official RCAC documentation website.
site_url: https://docs.rcac.purdue.edu

theme:
  name: material
  logo: assets/purdue.png
  favicon: assets/purdue_favicon.png
  custom_dir: overrides
  font:
    text: Roboto
    code: Consolas
  features:
    - navigation.indexes
    # Back-to-top button
    - navigation.top
    - navigation.footer
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to automatic mode

extra_css:
  - stylesheets/extra.css
extra_javascript:
  - assets/js/tablefilter.js
  - assets/js/init-tablefilter.js
  - assets/js/breadcrumbs.js
  - assets/js/external-links.js

plugins:
  - search
  - blog:
      archive_date_format: MMMM yyyy
      post_date_format: long
      categories_allowed:
        - Announcements
        - Anvil
        - Gautschi
        - Software
        - Slurm
        - Workflows
        - Life Sciences
      pagination_per_page: 5
      pagination_if_single_page: true
  - tags:
      enabled: true
  - git-revision-date-localized:
      enable_creation_date: true
      exclude:
      # Do not include timestamp in the following pages
        - index.md
        - contact.md
        - blog/*
        - software/*
        - datasets/*
  - macros

